<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Want Peace</title>
    <meta name="description"
        content="Step into the world of I Want Peace. A vast Roblox MMORPG where you forge your destiny.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="glow-blob blob-1"></div>
        <div class="glow-blob blob-2"></div>
        <div class="glow-blob blob-3"></div>
    </div>

    <!-- Nav -->
    <nav class="glass-nav">
        <div class="logo">
            <img src="images/gameicon.svg" alt="I Want Peace Logo" class="nav-logo" draggable="false">
            <img src="images/gametitlebanner.svg" alt="I Want Peace" class="nav-title" draggable="false">
        </div>
        <ul class="nav-links">
            <li><a href="https://discord.gg/gNajXYku5z" target="_blank"><i class="fab fa-discord"></i> Discord</a></li>
            <li><a href="https://www.youtube.com/channel/UCSsZ8z55SPwcWSmFQlCQCBg" target="_blank"><i
                        class="fab fa-youtube"></i> YouTube</a></li>
            <li><a href="https://yigitguven.net/i-want-peace/wiki/" target="_blank"><i class="fas fa-book"></i> Wiki</a>
            </li>
        </ul>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <!-- Main Content -->
        <div class="hero-content">
            <img src="images/gametitlebanner.svg" alt="I Want Peace MMORPG" class="banner-img" draggable="false">
            <p class="hero-subtitle">A world defined by your choices. A Roblox MMORPG.</p>

            <div class="release-block">
                <div class="tba-label">RELEASE DATE</div>
                <div class="tba-text">TO BE ANNOUNCED</div>
            </div>

            <button class="cta-btn locked" disabled>
                <i class="fas fa-lock"></i>&nbsp; PLAY NOW
            </button>
            <p class="discord-hint">
                <a href="https://discord.gg/gNajXYku5z" target="_blank">
                    <i class="fab fa-discord"></i> Join Discord for release announcements
                </a>
            </p>
        </div>

        <!-- Socials bottom -->
        <div class="hero-socials">
            <a href="https://discord.gg/gNajXYku5z" target="_blank"><i class="fab fa-discord"></i></a>
            <a href="https://www.youtube.com/channel/UCSsZ8z55SPwcWSmFQlCQCBg" target="_blank"><i
                    class="fab fa-youtube"></i></a>
            <a href="https://yigitguven.net/i-want-peace/wiki/" target="_blank"><i class="fas fa-book"></i></a>
        </div>

        <p class="page-copyright">&copy; 2026 <a href="https://yigitguven.net" target="_blank"
                style="color:inherit;opacity:0.5;">Yiğit Güven</a>. All rights reserved. <a
                href="https://www.roblox.com/join/ihw3w" target="_blank" style="color:inherit;opacity:0.5;">"I Want
                Peace"</a> is a <a href="https://www.roblox.com" target="_blank"
                style="color:inherit;opacity:0.5;">Roblox</a> experience.</p>
    </section>

    <script src="main.js"></script>
</body>

</html>
