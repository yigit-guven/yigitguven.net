<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Want Peace Wiki</title>
    <meta name="description" content="The I Want Peace MMORPG Wiki. Coming soon.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #050505;
            --red-crimson: #6b0000;
            --gold-bright: #d4af37;
            --gold-dark: #8b6914;
            --text-light: #e8e3d5;
            --glass-border: rgba(212, 175, 55, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        img,
        svg {
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
            draggable: false;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-light);
        }

        /* Background */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #3b0000 0%, #050505 65%);
        }

        .glow-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            animation: drift 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 50vw;
            height: 50vw;
            top: -10%;
            left: -10%;
            background: #8b0000;
        }

        .blob-2 {
            width: 35vw;
            height: 35vw;
            bottom: -10%;
            right: -10%;
            background: #5b0000;
            animation-delay: -7s;
        }

        .blob-3 {
            width: 25vw;
            height: 25vw;
            top: 40%;
            left: 60%;
            background: #2e1065;
            animation-delay: -14s;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(5%, 8%) scale(1.15);
            }
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/black-linen.png');
            opacity: 0.08;
            pointer-events: none;
            z-index: 1;
        }

        /* Nav */
        .glass-nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.2rem 3rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            backdrop-filter: blur(12px);
            background: rgba(5, 5, 5, 0.6);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-logo {
            height: 36px;
            width: auto;
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.4));
        }

        .nav-title {
            height: 22px;
            width: auto;
            opacity: 0.85;
            filter: drop-shadow(0 0 6px rgba(212, 175, 55, 0.3));
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 2.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--gold-dark);
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--gold-bright);
        }

        /* Main */
        .page {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            overflow: hidden;
        }

        /* Edge torchlight */
        .page::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 28% 80% at 0% 50%, rgba(180, 80, 0, 0.3) 0%, transparent 70%),
                radial-gradient(ellipse 28% 80% at 100% 50%, rgba(180, 80, 0, 0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 3;
            animation: torchFlicker 4s infinite ease-in-out alternate;
        }

        .page::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20%;
            background: linear-gradient(to top, rgba(5, 5, 5, 0.9), transparent);
            pointer-events: none;
            z-index: 3;
        }

        @keyframes torchFlicker {
            0% {
                opacity: 0.85;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.9;
            }
        }

        /* WIP Content */
        .wip-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1.2rem;
            z-index: 10;
            padding: 0 2rem;
        }

        .wip-icon {
            font-size: 3rem;
            color: var(--gold-dark);
            opacity: 0.5;
            animation: iconPulse 3s ease-in-out infinite alternate;
        }

        @keyframes iconPulse {
            from {
                opacity: 0.35;
                transform: scale(1);
            }

            to {
                opacity: 0.6;
                transform: scale(1.05);
            }
        }

        .wip-label {
            font-size: 0.6rem;
            letter-spacing: 0.5em;
            color: var(--gold-dark);
            opacity: 0.6;
            text-transform: uppercase;
        }

        .wip-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 900;
            letter-spacing: 0.3em;
            color: var(--gold-bright);
            text-shadow:
                0 0 30px rgba(212, 175, 55, 0.5),
                0 0 80px rgba(212, 175, 55, 0.2);
            animation: tbaPulse 3s ease-in-out infinite alternate;
        }

        @keyframes tbaPulse {
            from {
                text-shadow: 0 0 20px rgba(212, 175, 55, 0.4), 0 0 60px rgba(212, 175, 55, 0.1);
            }

            to {
                text-shadow: 0 0 40px rgba(212, 175, 55, 0.7), 0 0 100px rgba(212, 175, 55, 0.3);
            }
        }

        .wip-sub {
            font-size: 0.8rem;
            opacity: 0.4;
            letter-spacing: 0.1em;
            max-width: 400px;
            line-height: 1.8;
        }

        .back-btn {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.75rem 2.5rem;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-decoration: none;
            color: var(--gold-dark);
            border: 1px solid var(--glass-border);
            border-radius: 3px;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: var(--gold-bright);
            border-color: rgba(212, 175, 55, 0.4);
            background: rgba(212, 175, 55, 0.05);
            transform: translateY(-2px);
        }

        /* Copyright */
        .page-copyright {
            position: absolute;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.2);
            white-space: nowrap;
            z-index: 10;
        }

        .page-copyright a {
            color: inherit;
            opacity: 0.5;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="ambient-bg">
        <div class="glow-blob blob-1"></div>
        <div class="glow-blob blob-2"></div>
        <div class="glow-blob blob-3"></div>
    </div>

    <nav class="glass-nav">
        <div class="logo">
            <img src="../images/gameicon.svg" alt="I Want Peace Logo" class="nav-logo" draggable="false">
            <img src="../images/gametitlebanner.svg" alt="I Want Peace" class="nav-title" draggable="false">
        </div>
        <ul class="nav-links">
            <li><a href="https://discord.gg/gNajXYku5z" target="_blank"><i class="fab fa-discord"></i> Discord</a></li>
            <li><a href="https://www.youtube.com/channel/UCSsZ8z55SPwcWSmFQlCQCBg" target="_blank"><i
                        class="fab fa-youtube"></i> YouTube</a></li>
            <li><a href="../index.html"><i class="fas fa-home"></i> Home</a></li>
        </ul>
    </nav>

    <main class="page">
        <div class="wip-content">
            <div class="wip-icon"><i class="fas fa-scroll"></i></div>
            <div class="wip-label">I Want Peace Wiki</div>
            <div class="wip-title">WORK IN PROGRESS</div>
            <p class="wip-sub">The chronicles are being written. The wiki will be available when the game releases. Stay
                tuned for announcements.</p>
            <a href="https://discord.gg/gNajXYku5z" target="_blank" class="back-btn">
                <i class="fab fa-discord"></i>&nbsp; Join Discord for Updates
            </a>
        </div>

        <p class="page-copyright">&copy; 2026 <a href="https://yigitguven.net" target="_blank">Yiğit Güven</a>. All
            rights reserved. <a href="../index.html">"I Want Peace"</a> is a <a href="https://www.roblox.com"
                target="_blank">Roblox</a> experience.</p>
    </main>

    <script src="../main.js"></script>
</body>

</html>
